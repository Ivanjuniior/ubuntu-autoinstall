# AUTOINSTALL PARA IMPORTAÇÃO NA GUI

version: 1

locale: pt_BR.UTF-8
timezone: America/Bahia

keyboard:
  layout: br

network:
  version: 2
  ethernets:
    any:
      match:
        name: "en*"
      dhcp4: true
      optional: true

identity:
  hostname: ivanjr-Acer-Nitro-5
  realname: "Ivan Junior"
  username: ivanjr
  password: "$y$j9T$PbPDF2j2ruLG/dmh/folQ1$HmvspHbWRF8/bLMiEmBNQGc81axoSkCfOfOfwBlq4SB"

storage:
  config:

    # SISTEMA (1TB)
    - type: disk
      id: disk-system
      match:
        serial: 50026B77856B954A
      ptable: gpt
      wipe: superblock-recursive

    - type: partition
      id: partition-root
      device: disk-system
      size: -1

    - type: format
      id: format-root
      volume: partition-root
      fstype: ext4

    - type: mount
      path: /
      device: format-root

    # HOME (512GB - PRESERVADO)
    - type: disk
      id: disk-home
      match:
        serial: 231640226A3E
      preserve: true

    - type: partition
      id: partition-home
      device: disk-home
      number: 1
      preserve: true

    - type: mount
      path: /home
      device: partition-home

    # BACKUP (IGNORADO)
    - type: disk
      id: disk-backup
      match:
        serial: DX120A0000632
      preserve: true

packages:
  - vim
  - curl
  - htop
  - git
  - unzip
  - net-tools
  - openssh-server
  - build-essential
  - audacity
  - filezilla
  - obs-studio
  - virtualbox
  - r-base

snaps:
  - {name: postman}
  - {name: dbeaver-ce}
  - {name: keepassxc}
  - {name: simplenote}
  - {name: termius-app}
  - {name: visual-studio-code, classic: true}

late-commands:
  - curtin in-target -- bash -c "export DEBIAN_FRONTEND=noninteractive"
  - curtin in-target -- bash -c "echo 'nameserver 8.8.8.8' > /etc/resolv.conf"

  # valida internet
  - curtin in-target -- bash -c "for i in {1..10}; do ping -c1 google.com && break || sleep 5; done"

  - curtin in-target -- apt update

  # Chrome
  - curtin in-target -- wget -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
  - curtin in-target -- bash -c "dpkg -i /tmp/chrome.deb || apt -f install -y"

  # Edge
  - curtin in-target -- wget -O /tmp/edge.deb https://packages.microsoft.com/repos/edge/pool/main/m/microsoft-edge-stable/microsoft-edge-stable_amd64.deb
  - curtin in-target -- bash -c "dpkg -i /tmp/edge.deb || apt -f install -y"

  # AnyDesk
  - curtin in-target -- wget -O /tmp/anydesk.deb https://download.anydesk.com/linux/anydesk_6.2.1-1_amd64.deb
  - curtin in-target -- bash -c "dpkg -i /tmp/anydesk.deb || apt -f install -y"

  # RStudio
  - curtin in-target -- wget -O /tmp/rstudio.deb https://download1.rstudio.org/electron/jammy/amd64/rstudio-2023.12.1-402-amd64.deb
  - curtin in-target -- bash -c "dpkg -i /tmp/rstudio.deb || apt -f install -y"

  # SSH
  - curtin in-target -- systemctl enable ssh